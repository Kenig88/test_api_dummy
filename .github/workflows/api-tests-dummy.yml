
name: Run Docker Tests (Manual + Pages + History)

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - smoke
          - regression
          - negative

jobs:
  run-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Docker version
        run: |
          docker version
          docker compose version

      - name: Build Docker image
        run: docker compose build --no-cache

      - name: Run selected suite
        run: |
          docker compose run --rm ${{ github.event.inputs.suite }}

      - name: Fix permissions after Docker
        run: |
          sudo chown -R $USER:$USER .

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          curl -L -o allure.tgz https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      # 🔹 Получаем предыдущую history (если ветка существует)
      - name: Fetch history branch (if exists)
        run: |
          git fetch origin allure-history:allure-history || true

      - name: Restore previous history
        run: |
          if git show-ref --verify --quiet refs/heads/allure-history; then
            git checkout allure-history -- history || true
            if [ -d "history" ]; then
              mkdir -p allure-results/history
              cp -r history/* allure-results/history/ || true
            fi
            git checkout -- .
          fi

      - name: Generate Allure HTML report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # 🔹 Сохраняем новую history в ветку allure-history
      - name: Persist Allure history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout --orphan tmp-history
          git rm -rf . >/dev/null 2>&1 || true

          mkdir history
          cp -r allure-report/history/* history/ || true

          git add history
          git commit -m "Update Allure history"
          git branch -M allure-history
          git push -f origin allure-history
