name: Test Api Dummy (Manual + Pages + History)

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options: [ all, smoke, regression, negative ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Run selected suite
        run: docker compose run --rm ${{ github.event.inputs.suite }}

      - name: Fix permissions (only results)
        run: sudo chown -R $USER:$USER allure-results || true

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Allure
        uses: actions/cache@v4
        with:
          path: /opt/allure
          key: allure-2.27.0

      - name: Install Allure CLI
        run: |
          if [ ! -x /opt/allure/bin/allure ]; then
            ALLURE_VERSION=2.27.0
            curl -L -o allure.tgz https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
            tar -xzf allure.tgz
            sudo mv allure-${ALLURE_VERSION} /opt/allure
          fi
          sudo ln -sf /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Fetch history branch (if exists)
        run: git fetch --depth=1 origin allure-history:allure-history || true

      - name: Restore previous history
        run: |
          if git show-ref --verify --quiet refs/heads/allure-history; then
            git checkout allure-history -- history || true
            if [ -d "history" ]; then
              mkdir -p allure-results/history
              cp -r history/* allure-results/history/ || true
            fi
            git checkout -- .
          fi

      - name: Generate Allure HTML report
        run: allure generate allure-results -o allure-report --clean

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Persist Allure history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout --orphan tmp-history
          git rm -rf . >/dev/null 2>&1 || true

          mkdir history
          cp -r allure-report/history/* history/ || true

          git add history
          git commit -m "Update Allure history" || true
          git branch -M allure-history
          git push -f origin allure-history
